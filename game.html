<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>待ち時間ミニゲーム - 恐竜ARスタンプラリー</title>
  <meta name="theme-color" content="#111827">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/game.css">
  <script src="js/dinosaurs.js"></script>
  <script defer src="js/preload.js"></script>
  <script defer src="js/game-assets/p5.js"></script>
  <script defer src="js/game-assets/class.js"></script>
  <script defer src="js/game-assets/sketch.js"></script>
</head>
<body class="game-page-body">
  <div id="game-shell">
    <div class="game-top-panel">
      <div class="download-mini-status">
        <span>モデル：</span><strong data-download-status>ダウンロード進行中</strong>
      </div>
      <div class="mini-progress-track"><div class="mini-progress-fill" data-progress-bar></div></div>
      <div class="game-actions">
        <a class="button light js-game-nav" href="index.html">元のページに戻る</a>
        <a class="button js-game-nav" href="ar.html?allsafe=2">ARカメラを起動する</a>
      </div>
    </div>

    <div id="game-container">
      <div id="title-ui">
        <h1>スターダストクルセイダース</h1>
        <p class="blink">- TAP START -</p>
        <p class="title-help">縦型：白い点だけが当たり判定 / 指を動かした分だけ移動</p>
      </div>
    </div>
  </div>

  <script>
    // p5.js のタッチ処理に邪魔されないよう、上部ボタンは通常リンクとして確実に動かす。
    document.addEventListener('DOMContentLoaded', function () {
      document.querySelectorAll('.js-game-nav').forEach(function (link) {
        link.addEventListener('touchstart', function (event) { event.stopPropagation(); }, { passive: true });
        link.addEventListener('pointerdown', function (event) { event.stopPropagation(); });
        link.addEventListener('click', function (event) {
          event.stopPropagation();
          const href = link.getAttribute('href');
          if (href) window.location.href = href;
        });
      });
    });
  </script>
</body>
</html>
