<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>ARモデルテスト - プロトケラトプス</title>

  <!-- AR.jsで比較的使われている安定寄りの組み合わせ -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://unpkg.com/@ar-js-org/ar.js@3.4.5/aframe/build/aframe-ar.js"></script>



  <script>
    // GLBの大きさ・中心位置がバラバラでも、マーカー中央に収まるようにするテスト用コンポーネント
    AFRAME.registerComponent('fit-gltf-on-marker', {
      schema: { target: { type: 'number', default: 1.0 } },
      init: function () {
        this.el.addEventListener('model-loaded', () => {
          const mesh = this.el.getObject3D('mesh');
          if (!mesh || !window.THREE) return;

          // いったん初期化してからサイズ計算
          this.el.object3D.scale.set(1, 1, 1);
          this.el.object3D.position.set(0, 0, 0);
          this.el.object3D.updateMatrixWorld(true);

          const box = new THREE.Box3().setFromObject(mesh);
          const size = new THREE.Vector3();
          const center = new THREE.Vector3();
          box.getSize(size);
          box.getCenter(center);

          const maxSize = Math.max(size.x, size.y, size.z);
          const scale = maxSize > 0 ? this.data.target / maxSize : 1;

          this.el.object3D.scale.set(scale, scale, scale);
          // 中心をマーカー中央へ、足元をマーカー面より少し上へ
          this.el.object3D.position.set(
            -center.x * scale,
            -box.min.y * scale + 0.08,
            -center.z * scale
          );
          this.el.object3D.updateMatrixWorld(true);

          const status = document.getElementById('status');
          if (status) {
            status.textContent = 'プロトケラトプスGLBを読み込みました。赤い箱の近くに恐竜が出ているか確認してください。';
          }
        });

        this.el.addEventListener('model-error', (e) => {
          const status = document.getElementById('status');
          if (status) {
            status.textContent = 'GLBモデルの読み込みに失敗しました。赤い箱だけ出ている場合はモデル読み込み問題です。';
          }
          console.error('GLB model-error:', e);
        });
      }
    });
  </script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .top-help {
      position: fixed;
      top: calc(12px + env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      background: rgba(255,255,255,0.94);
      color: #111827;
      padding: 10px 16px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 14px;
      text-align: center;
      width: calc(100% - 48px);
      max-width: 560px;
      box-sizing: border-box;
    }

    .panel {
      position: fixed;
      left: 16px;
      right: 16px;
      bottom: calc(16px + env(safe-area-inset-bottom));
      z-index: 9999;
      background: rgba(15, 23, 42, 0.92);
      color: #fff;
      border: 1px solid rgba(148, 163, 184, 0.4);
      border-radius: 20px;
      padding: 16px;
      box-sizing: border-box;
      backdrop-filter: blur(10px);
    }

    .title {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-weight: 800;
      font-size: 18px;
      margin-bottom: 8px;
    }

    #status {
      font-size: 15px;
      line-height: 1.6;
      color: #e5e7eb;
      margin-bottom: 12px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .actions a {
      display: inline-block;
      background: #fff;
      color: #111827;
      text-decoration: none;
      padding: 10px 16px;
      border-radius: 999px;
      font-weight: 800;
    }

    /* このテストではAR.js標準のvideo/canvas配置をなるべく壊さない */
    a-scene {
      position: fixed !important;
      inset: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
    }
  </style>
</head>
<body>
  <div class="top-help">pattern-stanp1 をかざしてください。赤い箱に加えてプロトケラトプスが出るか確認します。</div>

  <div class="panel">
    <div class="title">
      <span>ARモデルテスト</span>
      <span>プロトケラトプス</span>
    </div>
    <div id="status">マーカーを探しています。赤い箱などに加えて、プロトケラトプスGLBが出るか確認します。</div>
    <div class="actions">
      <a href="collection.html">コレクション</a>
      <a href="index.html">トップへ</a>
    </div>
  </div>

  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; antialias: true; alpha: true"
    gltf-model="dracoDecoderPath: https://www.gstatic.com/draco/versioned/decoders/1.5.6/;"
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono; trackingMethod: best;">

    <a-assets timeout="30000">
      <a-asset-item id="protoceratops-model" src="assets/models/protoceratops.glb"></a-asset-item>
    </a-assets>

    <a-marker id="test-marker" type="pattern" url="assets/markers/pattern-stanp1.patt" emitevents="true">
      <!-- まずはGLBなし。絶対に見えやすい基本図形だけ。 -->
      <a-box
        position="0 0.5 0"
        width="1"
        height="1"
        depth="1"
        color="#ff0000"
        opacity="1"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 3000">
      </a-box>
      <a-cylinder
        position="0 0.03 0"
        radius="0.9"
        height="0.06"
        color="#2563eb"
        opacity="1">
      </a-cylinder>
      <a-sphere
        position="0 1.25 0"
        radius="0.25"
        color="#22c55e">
      </a-sphere>

      <!-- ここからGLBモデルテスト。赤箱などは残し、GLBだけ失敗しても切り分けできるようにする。 -->
      <a-entity id="protoceratops-holder" position="0 0.08 0" rotation="0 0 0">
        <a-entity
          id="protoceratops-entity"
          gltf-model="#protoceratops-model"
          fit-gltf-on-marker="target: 1.1"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 9000">
        </a-entity>
      </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    const statusEl = document.getElementById('status');
    const marker = document.getElementById('test-marker');

    marker.addEventListener('markerFound', () => {
      statusEl.textContent = 'pattern-stanp1 を認識しました。赤い箱・青い土台・緑の球に加えて、プロトケラトプスが出るか確認してください。';
    });

    marker.addEventListener('markerLost', () => {
      statusEl.textContent = 'マーカーを見失いました。もう一度 pattern-stanp1 全体を画面に入れてください。';
    });

    window.addEventListener('error', (e) => {
      statusEl.textContent = 'エラー: ' + (e.message || '不明なエラー');
    });
  </script>
</body>
</html>
