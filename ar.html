<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>恐竜ARスタンプラリー</title>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://unpkg.com/@ar-js-org/ar.js@3.4.5/aframe/build/aframe-ar.js"></script>
  <script src="js/dinosaurs.js"></script>
  <script src="js/collection.js"></script>

  <script>
    AFRAME.registerComponent('fit-gltf-on-marker', {
      schema: {
        target: { type: 'number', default: 1.2 },
        yOffset: { type: 'number', default: 0.04 }
      },
      init: function () {
        this.el.addEventListener('model-loaded', () => {
          const mesh = this.el.getObject3D('mesh');
          if (!mesh || !window.THREE) return;

          const scene = this.el.sceneEl;
          if (scene && scene.renderer) {
            try {
              scene.renderer.setClearColor(new THREE.Color(0x000000), 0);
              scene.renderer.setClearAlpha(0);
            } catch (e) {}
          }

          this.el.object3D.scale.set(1, 1, 1);
          this.el.object3D.position.set(0, 0, 0);
          this.el.object3D.updateMatrixWorld(true);

          const box = new THREE.Box3().setFromObject(mesh);
          const size = new THREE.Vector3();
          const center = new THREE.Vector3();
          box.getSize(size);
          box.getCenter(center);

          const maxSize = Math.max(size.x, size.y, size.z);
          const scale = maxSize > 0 ? this.data.target / maxSize : 1;

          this.el.object3D.scale.set(scale, scale, scale);
          this.el.object3D.position.set(
            -center.x * scale,
            -box.min.y * scale + this.data.yOffset,
            -center.z * scale
          );
          this.el.object3D.updateMatrixWorld(true);
        });

        this.el.addEventListener('model-error', (e) => {
          const status = document.getElementById('status');
          if (status) status.textContent = 'GLBモデルの読み込みに失敗しました。ファイル名を確認してください。';
          console.error('GLB model-error:', e);
        });
      }
    });

    // AR.jsは起動後に video / canvas のstyleを何度も上書きします。
    // CSSだけでは負けることがあるため、標準命令の後から「画面サイズぴったり」に戻し続けます。
    let arViewportPatchRunning = false;

    function getRealViewportSize() {
      const viewport = window.visualViewport;
      return {
        width: Math.ceil(viewport?.width || window.innerWidth || document.documentElement.clientWidth),
        height: Math.ceil(viewport?.height || window.innerHeight || document.documentElement.clientHeight)
      };
    }

    function setImportantStyle(el, styles) {
      if (!el || !el.style) return;
      Object.entries(styles).forEach(([key, value]) => {
        el.style.setProperty(key, value, 'important');
      });
    }

    function keepCameraBackgroundVisible() {
      if (arViewportPatchRunning) return;
      arViewportPatchRunning = true;

      try {
        const { width, height } = getRealViewportSize();
        const widthPx = `${width}px`;
        const heightPx = `${height}px`;

        document.documentElement.style.setProperty('--ar-vw', widthPx);
        document.documentElement.style.setProperty('--ar-vh', heightPx);

        setImportantStyle(document.documentElement, {
          margin: '0',
          padding: '0',
          width: widthPx,
          height: heightPx,
          overflow: 'hidden',
          background: '#000'
        });

        setImportantStyle(document.body, {
          margin: '0',
          padding: '0',
          width: widthPx,
          height: heightPx,
          overflow: 'hidden',
          background: '#000'
        });

        const scene = document.querySelector('a-scene');
        if (scene) {
          setImportantStyle(scene, {
            position: 'fixed',
            top: '0',
            left: '0',
            right: 'auto',
            bottom: 'auto',
            width: widthPx,
            height: heightPx,
            'min-width': widthPx,
            'min-height': heightPx,
            'max-width': 'none',
            'max-height': 'none',
            overflow: 'hidden',
            background: 'transparent',
            transform: 'none',
            'z-index': '1'
          });

          if (scene.renderer && window.THREE) {
            try {
              scene.renderer.setClearColor(new THREE.Color(0x000000), 0);
              scene.renderer.setClearAlpha(0);
              scene.renderer.autoClear = true;
              if (scene.object3D) scene.object3D.background = null;
            } catch (e) {}
          }

          try { scene.resize?.(); } catch (e) {}
        }

        // AR.jsが作るvideoは id や配置が端末で変わるため、広めに拾います。
        document.querySelectorAll('video, body > video, #arjs-video, .arjs-video').forEach((el) => {
          el.setAttribute('playsinline', '');
          el.setAttribute('webkit-playsinline', '');
          setImportantStyle(el, {
            display: 'block',
            visibility: 'visible',
            opacity: '1',
            position: 'fixed',
            top: '0',
            left: '0',
            right: 'auto',
            bottom: 'auto',
            width: widthPx,
            height: heightPx,
            'min-width': widthPx,
            'min-height': heightPx,
            'max-width': 'none',
            'max-height': 'none',
            margin: '0',
            padding: '0',
            'object-fit': 'cover',
            'object-position': 'center center',
            transform: 'translate3d(0,0,0)',
            'transform-origin': 'center center',
            background: '#000',
            'z-index': '0',
            'pointer-events': 'none'
          });
        });

        // A-Frame / AR.jsのcanvasはAR.jsにstyleを書き戻されやすいので、毎回importantで戻します。
        document.querySelectorAll('a-scene canvas, canvas.a-canvas, .a-canvas, body > canvas').forEach((el) => {
          setImportantStyle(el, {
            display: 'block',
            position: 'fixed',
            top: '0',
            left: '0',
            right: 'auto',
            bottom: 'auto',
            width: widthPx,
            height: heightPx,
            'min-width': widthPx,
            'min-height': heightPx,
            'max-width': 'none',
            'max-height': 'none',
            margin: '0',
            padding: '0',
            background: 'transparent',
            transform: 'translate3d(0,0,0)',
            'transform-origin': 'center center',
            'z-index': '2',
            'pointer-events': 'none'
          });
        });

        document.querySelectorAll('.a-enter-vr, .a-enter-ar').forEach((el) => {
          setImportantStyle(el, { display: 'none' });
        });
      } finally {
        arViewportPatchRunning = false;
      }
    }

    function startArViewportPatcher() {
      // 起動直後はAR.jsが何回もstyleを書き換えるので、しばらく毎フレーム補正します。
      let frameCount = 0;
      function patchForStartup() {
        keepCameraBackgroundVisible();
        frameCount += 1;
        if (frameCount < 240) requestAnimationFrame(patchForStartup);
      }
      requestAnimationFrame(patchForStartup);

      // その後も標準命令の上書き対策として低頻度で補正します。
      setInterval(keepCameraBackgroundVisible, 800);

      // video/canvasのstyle属性がAR.jsに書き換えられた瞬間にも補正します。
      const observer = new MutationObserver(() => requestAnimationFrame(keepCameraBackgroundVisible));
      observer.observe(document.body, {
        childList: true,
        subtree: true,
        attributes: true,
        attributeFilter: ['style', 'class', 'width', 'height']
      });

      window.addEventListener('resize', () => requestAnimationFrame(keepCameraBackgroundVisible));
      window.addEventListener('orientationchange', () => {
        [100, 300, 700, 1200].forEach(ms => setTimeout(keepCameraBackgroundVisible, ms));
      });
      window.visualViewport?.addEventListener('resize', () => requestAnimationFrame(keepCameraBackgroundVisible));
      window.visualViewport?.addEventListener('scroll', () => requestAnimationFrame(keepCameraBackgroundVisible));
    }

    window.addEventListener('load', startArViewportPatcher);
  </script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .top-help {
      position: fixed;
      top: calc(12px + env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      background: rgba(255,255,255,0.94);
      color: #111827;
      padding: 10px 16px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 14px;
      text-align: center;
      width: calc(100% - 48px);
      max-width: 560px;
      box-sizing: border-box;
    }

    .panel {
      position: fixed;
      left: 16px;
      right: 16px;
      bottom: calc(16px + env(safe-area-inset-bottom));
      z-index: 9999;
      background: rgba(15, 23, 42, 0.92);
      color: #fff;
      border: 1px solid rgba(148, 163, 184, 0.4);
      border-radius: 20px;
      padding: 16px;
      box-sizing: border-box;
      backdrop-filter: blur(10px);
    }

    .title {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-weight: 800;
      font-size: 18px;
      margin-bottom: 8px;
    }

    #status {
      font-size: 15px;
      line-height: 1.6;
      color: #e5e7eb;
      margin-bottom: 12px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .actions a, .actions button {
      display: inline-block;
      background: #fff;
      color: #111827;
      text-decoration: none;
      padding: 10px 16px;
      border-radius: 999px;
      font-weight: 800;
      border: 0;
      font-size: 14px;
    }

    .actions button {
      background: #fff;
    }

    .actions button:disabled {
      opacity: 0.55;
    }

    #collected-count {
      margin-left: auto;
      color: #e5e7eb;
      font-size: 13px;
      font-weight: 800;
    }

    :root {
      --ar-vw: 100vw;
      --ar-vh: 100dvh;
    }

    a-scene {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      right: auto !important;
      bottom: auto !important;
      width: var(--ar-vw) !important;
      height: var(--ar-vh) !important;
      min-width: var(--ar-vw) !important;
      min-height: var(--ar-vh) !important;
      max-width: none !important;
      max-height: none !important;
      overflow: hidden !important;
      background: transparent !important;
      transform: none !important;
      z-index: 1 !important;
    }

    video, #arjs-video, .arjs-video {
      display: block !important;
      visibility: visible !important;
      opacity: 1 !important;
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      right: auto !important;
      bottom: auto !important;
      width: var(--ar-vw) !important;
      height: var(--ar-vh) !important;
      min-width: var(--ar-vw) !important;
      min-height: var(--ar-vh) !important;
      max-width: none !important;
      max-height: none !important;
      margin: 0 !important;
      padding: 0 !important;
      object-fit: cover !important;
      object-position: center center !important;
      z-index: 0 !important;
      transform: translate3d(0,0,0) !important;
      transform-origin: center center !important;
      background: #000 !important;
      pointer-events: none !important;
    }

    canvas, .a-canvas, a-scene canvas {
      display: block !important;
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      right: auto !important;
      bottom: auto !important;
      width: var(--ar-vw) !important;
      height: var(--ar-vh) !important;
      min-width: var(--ar-vw) !important;
      min-height: var(--ar-vh) !important;
      max-width: none !important;
      max-height: none !important;
      margin: 0 !important;
      padding: 0 !important;
      background: transparent !important;
      z-index: 2 !important;
      pointer-events: none !important;
      transform: translate3d(0,0,0) !important;
      transform-origin: center center !important;
    }

    .a-enter-vr, .a-enter-ar {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="top-help">マーカーをかざしてください。対応する3Dモデルを表示します。</div>

  <div class="panel">
    <div class="title">
      <span>ARカメラ</span>
      <span id="current-model-name">待機中</span>
    </div>
    <div id="status">マーカーを探しています。マーカー全体が画面に入るようにしてください。</div>
    <div class="actions">
      <button id="add-collection" disabled>コレクションに追加</button>
      <a href="collection.html">コレクション</a>
      <a href="index.html">トップへ</a>
      <span id="collected-count">0 / 6</span>
    </div>
  </div>

  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; antialias: true; alpha: true; colorManagement: true"
    gltf-model="dracoDecoderPath: https://www.gstatic.com/draco/versioned/decoders/1.5.6/;"
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono; trackingMethod: best;">

    <a-assets timeout="60000">
      <a-asset-item id="model-protoceratops" src="assets/models/protoceratops.glb"></a-asset-item>
      <a-asset-item id="model-ravjaa" src="assets/models/ravjaa.glb"></a-asset-item>
      <a-asset-item id="model-corythosaurus" src="assets/models/corythosaurus.glb"></a-asset-item>
      <a-asset-item id="model-zavacephale" src="assets/models/zavacephale.glb"></a-asset-item>
      <a-asset-item id="model-pinacosaurus" src="assets/models/raujaa.glb"></a-asset-item>
      <a-asset-item id="model-tarbosaurus" src="assets/models/torikosaurusu.glb"></a-asset-item>
    </a-assets>

    <a-marker id="marker-protoceratops" data-dino-id="protoceratops" type="pattern" url="assets/markers/pattern-stanp1.patt" emitevents="true">
      <a-entity light="type: ambient; intensity: 1.8"></a-entity>
      <a-entity light="type: directional; intensity: 1.2" position="0 2 2"></a-entity>
      <a-entity position="0 0.02 0" rotation="0 180 0">
        <a-entity gltf-model="#model-protoceratops" fit-gltf-on-marker="target: 1.45; yOffset: 0.05" animation="property: rotation; to: 0 360 0; loop: true; dur: 12000"></a-entity>
      </a-entity>
    </a-marker>

    <a-marker id="marker-ravjaa" data-dino-id="ravjaa" type="pattern" url="assets/markers/pattern-stanp2.patt" emitevents="true">
      <a-entity light="type: ambient; intensity: 1.8"></a-entity>
      <a-entity light="type: directional; intensity: 1.2" position="0 2 2"></a-entity>
      <a-entity position="0 0.02 0" rotation="0 180 0">
        <a-entity gltf-model="#model-ravjaa" fit-gltf-on-marker="target: 1.25; yOffset: 0.05" animation="property: rotation; to: 0 360 0; loop: true; dur: 12000"></a-entity>
      </a-entity>
    </a-marker>

    <a-marker id="marker-corythosaurus" data-dino-id="corythosaurus" type="pattern" url="assets/markers/pattern-stanp3.patt" emitevents="true">
      <a-entity light="type: ambient; intensity: 1.8"></a-entity>
      <a-entity light="type: directional; intensity: 1.2" position="0 2 2"></a-entity>
      <a-entity position="0 0.02 0" rotation="0 180 0">
        <a-entity gltf-model="#model-corythosaurus" fit-gltf-on-marker="target: 1.25; yOffset: 0.05" animation="property: rotation; to: 0 360 0; loop: true; dur: 12000"></a-entity>
      </a-entity>
    </a-marker>

    <a-marker id="marker-zavacephale" data-dino-id="zavacephale" type="pattern" url="assets/markers/pattern-stanp4.patt" emitevents="true">
      <a-entity light="type: ambient; intensity: 1.8"></a-entity>
      <a-entity light="type: directional; intensity: 1.2" position="0 2 2"></a-entity>
      <a-entity position="0 0.02 0" rotation="0 180 0">
        <a-entity gltf-model="#model-zavacephale" fit-gltf-on-marker="target: 1.25; yOffset: 0.05" animation="property: rotation; to: 0 360 0; loop: true; dur: 12000"></a-entity>
      </a-entity>
    </a-marker>

    <a-marker id="marker-pinacosaurus" data-dino-id="pinacosaurus" type="pattern" url="assets/markers/pattern-stanp5.patt" emitevents="true">
      <a-entity light="type: ambient; intensity: 1.8"></a-entity>
      <a-entity light="type: directional; intensity: 1.2" position="0 2 2"></a-entity>
      <a-entity position="0 0.02 0" rotation="0 180 0">
        <a-entity gltf-model="#model-pinacosaurus" fit-gltf-on-marker="target: 1.25; yOffset: 0.05" animation="property: rotation; to: 0 360 0; loop: true; dur: 12000"></a-entity>
      </a-entity>
    </a-marker>

    <a-marker id="marker-tarbosaurus" data-dino-id="tarbosaurus" type="pattern" url="assets/markers/pattern-stanp6.patt" emitevents="true">
      <a-entity light="type: ambient; intensity: 1.8"></a-entity>
      <a-entity light="type: directional; intensity: 1.2" position="0 2 2"></a-entity>
      <a-entity position="0 0.02 0" rotation="0 180 0">
        <a-entity gltf-model="#model-tarbosaurus" fit-gltf-on-marker="target: 1.25; yOffset: 0.05" animation="property: rotation; to: 0 360 0; loop: true; dur: 12000"></a-entity>
      </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    const statusEl = document.getElementById('status');
    const nameEl = document.getElementById('current-model-name');
    const addButton = document.getElementById('add-collection');
    const countEl = document.getElementById('collected-count');
    const visibleIds = new Set();
    let currentId = null;

    function updateCount() {
      if (!countEl || typeof getCollection !== 'function') return;
      countEl.textContent = `${getCollection().length} / ${window.DINOSAURS.length}`;
    }

    function setCurrent(id) {
      currentId = id;
      const dino = id && typeof findDinosaur === 'function' ? findDinosaur(id) : null;
      if (!dino) {
        if (nameEl) nameEl.textContent = '待機中';
        if (statusEl) statusEl.textContent = 'マーカーを探しています。マーカー全体が画面に入るようにしてください。';
        if (addButton) {
          addButton.disabled = true;
          addButton.textContent = 'コレクションに追加';
        }
        return;
      }

      if (nameEl) nameEl.textContent = dino.name;
      if (statusEl) statusEl.textContent = `${dino.name} を認識しました。3Dモデルが見えるか確認してください。`;
      if (addButton) {
        addButton.disabled = false;
        const already = getCollection().includes(id);
        addButton.textContent = already ? `${dino.name} は追加済み` : `${dino.name} を追加`;
      }
      keepCameraBackgroundVisible();
    }

    document.querySelectorAll('a-marker[data-dino-id]').forEach((marker) => {
      const id = marker.dataset.dinoId;
      marker.addEventListener('markerFound', () => {
        visibleIds.add(id);
        setCurrent(id);
      });
      marker.addEventListener('markerLost', () => {
        visibleIds.delete(id);
        setCurrent([...visibleIds][0] || null);
      });
    });

    if (addButton) {
      addButton.addEventListener('click', () => {
        if (!currentId) return;
        const dino = findDinosaur(currentId);
        addToCollection(currentId);
        updateCount();
        setCurrent(currentId);
        if (statusEl) statusEl.textContent = `${dino.name} をコレクションに追加しました。`;
      });
    }

    const sceneEl = document.querySelector('a-scene');
    if (sceneEl) {
      sceneEl.addEventListener('renderstart', () => {
        keepCameraBackgroundVisible();
        setTimeout(keepCameraBackgroundVisible, 500);
      });
    }

    window.addEventListener('error', (e) => {
      if (statusEl) statusEl.textContent = 'エラー: ' + (e.message || '不明なエラー');
    });

    updateCount();
  </script>
</body>
</html>
