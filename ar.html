<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>ARモデル調整</title>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://unpkg.com/@ar-js-org/ar.js@3.4.5/aframe/build/aframe-ar.js"></script>

  <script>
    // ここにマーカーとモデルを追加していく。
    // markerUrl と modelUrl のファイルが存在しないものは自動でスキップします。
    window.AR_MODELS = [
      {
        id: 'stanp1',
        name: 'プロトケラトプス',
        markerName: 'pattern-stanp1',
        markerUrl: 'assets/markers/pattern-stanp1.patt',
        modelUrl: 'assets/models/protoceratops.glb',
        target: 1.45,
        yOffset: 0.05,
        rotation: '0 180 0',
        spin: true
      },
      {
        id: 'stanp2',
        name: 'モデル2',
        markerName: 'pattern-stanp2',
        markerUrl: 'assets/markers/pattern-stanp2.patt',
        modelUrl: 'assets/models/model2.glb',
        target: 1.3,
        yOffset: 0.05,
        rotation: '0 180 0',
        spin: true
      },
      {
        id: 'stanp3',
        name: 'モデル3',
        markerName: 'pattern-stanp3',
        markerUrl: 'assets/markers/pattern-stanp3.patt',
        modelUrl: 'assets/models/model3.glb',
        target: 1.3,
        yOffset: 0.05,
        rotation: '0 180 0',
        spin: true
      },
      {
        id: 'stanp4',
        name: 'モデル4',
        markerName: 'pattern-stanp4',
        markerUrl: 'assets/markers/pattern-stanp4.patt',
        modelUrl: 'assets/models/model4.glb',
        target: 1.3,
        yOffset: 0.05,
        rotation: '0 180 0',
        spin: true
      }
    ];
  </script>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0 !important;
      padding: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      min-width: 100vw !important;
      min-height: 100vh !important;
      overflow: hidden !important;
      overscroll-behavior: none;
      background: #000 !important;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: none;
    }

    body {
      position: fixed !important;
      inset: 0 !important;
    }

    #ar-root {
      position: fixed !important;
      inset: 0 !important;
      width: 100vw !important;
      height: 100dvh !important;
      overflow: hidden !important;
      background: #000 !important;
    }

    a-scene,
    .a-canvas,
    canvas,
    video,
    #arjs-video {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      right: auto !important;
      bottom: auto !important;
      width: 100vw !important;
      height: 100dvh !important;
      max-width: none !important;
      max-height: none !important;
      min-width: 100vw !important;
      min-height: 100dvh !important;
      margin: 0 !important;
      padding: 0 !important;
      transform: none !important;
    }

    a-scene {
      z-index: 1 !important;
      background: transparent !important;
      overflow: hidden !important;
    }

    video,
    #arjs-video {
      display: block !important;
      visibility: visible !important;
      opacity: 1 !important;
      object-fit: cover !important;
      z-index: 0 !important;
      pointer-events: none !important;
      background: #000 !important;
    }

    canvas,
    .a-canvas {
      z-index: 2 !important;
      pointer-events: none !important;
      background: transparent !important;
    }

    .a-loader-title,
    .a-enter-vr,
    .a-enter-ar {
      display: none !important;
    }

    .top-help {
      position: fixed;
      top: calc(12px + env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      background: rgba(255, 255, 255, 0.94);
      color: #111827;
      padding: 10px 16px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 14px;
      line-height: 1.45;
      text-align: center;
      width: calc(100vw - 48px);
      max-width: 560px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }

    .panel {
      position: fixed;
      left: 16px;
      right: 16px;
      bottom: calc(16px + env(safe-area-inset-bottom));
      z-index: 9999;
      background: rgba(15, 23, 42, 0.92);
      color: #fff;
      border: 1px solid rgba(148, 163, 184, 0.4);
      border-radius: 20px;
      padding: 16px;
      backdrop-filter: blur(10px);
    }

    .title {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-weight: 800;
      font-size: 18px;
      margin-bottom: 8px;
    }

    #ar-status {
      font-size: 15px;
      line-height: 1.6;
      color: #e5e7eb;
      margin-bottom: 12px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .actions a,
    .actions button {
      display: inline-block;
      border: 0;
      background: #fff;
      color: #111827;
      text-decoration: none;
      padding: 10px 16px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 14px;
    }

    .actions button:disabled {
      opacity: 0.55;
    }
  </style>
</head>
<body>
  <div id="top-help" class="top-help">マーカーをかざしてください。対応する3Dモデルを表示します。</div>

  <div id="ar-root">
    <a-scene
      id="ar-scene"
      embedded
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      renderer="logarithmicDepthBuffer: true; antialias: true; alpha: true; colorManagement: true"
      gltf-model="dracoDecoderPath: https://www.gstatic.com/draco/versioned/decoders/1.5.6/;"
      arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono; trackingMethod: best;">

      <a-entity id="markers-root"></a-entity>
      <a-entity camera></a-entity>
    </a-scene>
  </div>

  <div id="ar-ui" class="panel">
    <div class="title">
      <span>ARモデル調整</span>
      <span id="current-model-name">待機中</span>
    </div>
    <div id="ar-status">マーカーを探しています。マーカー全体が画面に入るようにしてください。</div>
    <div class="actions">
      <button id="add-collection" type="button" disabled>コレクションに追加</button>
      <a href="collection.html">コレクション</a>
      <a href="index.html">トップへ</a>
    </div>
  </div>

</body>
</html>
