<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>ARモデル調整 - プロトケラトプス</title>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://unpkg.com/@ar-js-org/ar.js@3.4.5/aframe/build/aframe-ar.js"></script>

  <script>
    // GLBモデルをマーカー中央に置き、見えやすいサイズに自動調整する
    AFRAME.registerComponent('fit-gltf-on-marker', {
      schema: {
        target: { type: 'number', default: 1.45 },
        yOffset: { type: 'number', default: 0.04 }
      },
      init: function () {
        this.el.addEventListener('model-loaded', () => {
          const mesh = this.el.getObject3D('mesh');
          if (!mesh || !window.THREE) return;

          // 透明背景にして、黒背景ではなくカメラ映像を見せる
          const scene = this.el.sceneEl;
          if (scene && scene.renderer) {
            scene.renderer.setClearColor(new THREE.Color(0x000000), 0);
          }

          // 初期化してから元モデルのサイズと中心を取得
          this.el.object3D.scale.set(1, 1, 1);
          this.el.object3D.position.set(0, 0, 0);
          this.el.object3D.updateMatrixWorld(true);

          const box = new THREE.Box3().setFromObject(mesh);
          const size = new THREE.Vector3();
          const center = new THREE.Vector3();
          box.getSize(size);
          box.getCenter(center);

          const maxSize = Math.max(size.x, size.y, size.z);
          const scale = maxSize > 0 ? this.data.target / maxSize : 1;

          this.el.object3D.scale.set(scale, scale, scale);
          this.el.object3D.position.set(
            -center.x * scale,
            -box.min.y * scale + this.data.yOffset,
            -center.z * scale
          );
          this.el.object3D.updateMatrixWorld(true);

          const status = document.getElementById('status');
          if (status) {
            status.textContent = 'プロトケラトプスを読み込みました。マーカー上に出るか確認してください。';
          }
        });

        this.el.addEventListener('model-error', (e) => {
          const status = document.getElementById('status');
          if (status) status.textContent = 'GLBモデルの読み込みに失敗しました。';
          console.error('GLB model-error:', e);
        });
      }
    });

    // カメラ映像が黒背景に隠れないようにする補正。
    // AR.jsは video を z-index:-2 付近で生成することがあり、
    // Android Chromeではcanvasだけ見えてカメラ背景が黒になる場合がある。
    function getViewportSize() {
      const vv = window.visualViewport;
      const width = Math.max(
        1,
        Math.round(window.innerWidth || 0),
        Math.round(document.documentElement.clientWidth || 0),
        Math.round(vv ? vv.width : 0)
      );
      const height = Math.max(
        1,
        Math.round(window.innerHeight || 0),
        Math.round(document.documentElement.clientHeight || 0),
        Math.round(vv ? vv.height : 0)
      );
      return { width, height };
    }

    // AR.js の video と A-Frame の canvas の表示サイズがズレると、
    // マーカー認識位置とモデル表示位置がズレるため、両方を同じpxサイズへ強制する。
    function keepCameraBackgroundVisible() {
      const { width, height } = getViewportSize();
      const pxWidth = width + 'px';
      const pxHeight = height + 'px';

      const scene = document.querySelector('a-scene');
      if (scene && scene.renderer && window.THREE) {
        try {
          scene.renderer.setClearColor(new THREE.Color(0x000000), 0);
          scene.renderer.setClearAlpha(0);
          scene.renderer.autoClear = true;
          scene.renderer.setSize(width, height, false);
          if (scene.object3D) scene.object3D.background = null;
        } catch (e) {}
      }

      [document.documentElement, document.body].forEach((el) => {
        el.style.setProperty('margin', '0', 'important');
        el.style.setProperty('padding', '0', 'important');
        el.style.setProperty('width', pxWidth, 'important');
        el.style.setProperty('height', pxHeight, 'important');
        el.style.setProperty('min-width', pxWidth, 'important');
        el.style.setProperty('min-height', pxHeight, 'important');
        el.style.setProperty('overflow', 'hidden', 'important');
        el.style.setProperty('background', '#000', 'important');
      });
      document.body.style.setProperty('position', 'fixed', 'important');
      document.body.style.setProperty('inset', '0', 'important');

      document.querySelectorAll('video, #arjs-video, a-scene, canvas, .a-canvas').forEach((el) => {
        el.style.setProperty('display', 'block', 'important');
        el.style.setProperty('visibility', 'visible', 'important');
        el.style.setProperty('opacity', '1', 'important');
        el.style.setProperty('position', 'fixed', 'important');
        el.style.setProperty('top', '0', 'important');
        el.style.setProperty('left', '0', 'important');
        el.style.setProperty('right', 'auto', 'important');
        el.style.setProperty('bottom', 'auto', 'important');
        el.style.setProperty('width', pxWidth, 'important');
        el.style.setProperty('height', pxHeight, 'important');
        el.style.setProperty('min-width', pxWidth, 'important');
        el.style.setProperty('min-height', pxHeight, 'important');
        el.style.setProperty('max-width', 'none', 'important');
        el.style.setProperty('max-height', 'none', 'important');
        el.style.setProperty('margin', '0', 'important');
        el.style.setProperty('padding', '0', 'important');
        el.style.setProperty('transform', 'none', 'important');
        el.style.setProperty('box-sizing', 'border-box', 'important');
      });

      document.querySelectorAll('video, #arjs-video').forEach((el) => {
        el.style.setProperty('object-fit', 'cover', 'important');
        el.style.setProperty('z-index', '0', 'important');
        el.style.setProperty('pointer-events', 'none', 'important');
        el.style.setProperty('background', '#000', 'important');
      });

      document.querySelectorAll('a-scene').forEach((el) => {
        el.style.setProperty('z-index', '1', 'important');
        el.style.setProperty('background', 'transparent', 'important');
      });

      document.querySelectorAll('canvas, .a-canvas').forEach((el) => {
        el.style.setProperty('z-index', '2', 'important');
        el.style.setProperty('pointer-events', 'none', 'important');
        el.style.setProperty('background', 'transparent', 'important');
        if (el.tagName && el.tagName.toLowerCase() === 'canvas') {
          const dpr = Math.min(window.devicePixelRatio || 1, 2);
          const realWidth = Math.round(width * dpr);
          const realHeight = Math.round(height * dpr);
          if (el.width !== realWidth) el.width = realWidth;
          if (el.height !== realHeight) el.height = realHeight;
        }
      });
    }

    window.addEventListener('load', () => {
      [50, 100, 250, 500, 900, 1400, 2200, 3500, 6000, 9000].forEach(ms => setTimeout(keepCameraBackgroundVisible, ms));
      const observer = new MutationObserver(() => keepCameraBackgroundVisible());
      observer.observe(document.body, { childList: true, subtree: true, attributes: true });
      window.addEventListener('resize', () => setTimeout(keepCameraBackgroundVisible, 100));
      window.addEventListener('orientationchange', () => {
        setTimeout(keepCameraBackgroundVisible, 300);
        setTimeout(keepCameraBackgroundVisible, 900);
      });
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', keepCameraBackgroundVisible);
        window.visualViewport.addEventListener('scroll', keepCameraBackgroundVisible);
      }
    });
  </script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      position: fixed;
      inset: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .top-help {
      position: fixed;
      top: calc(12px + env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      background: rgba(255,255,255,0.94);
      color: #111827;
      padding: 10px 16px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 14px;
      text-align: center;
      width: calc(100% - 48px);
      max-width: 560px;
      box-sizing: border-box;
    }

    .panel {
      position: fixed;
      left: 16px;
      right: 16px;
      bottom: calc(16px + env(safe-area-inset-bottom));
      z-index: 9999;
      background: rgba(15, 23, 42, 0.92);
      color: #fff;
      border: 1px solid rgba(148, 163, 184, 0.4);
      border-radius: 20px;
      padding: 16px;
      box-sizing: border-box;
      backdrop-filter: blur(10px);
    }

    .title {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-weight: 800;
      font-size: 18px;
      margin-bottom: 8px;
    }

    #status {
      font-size: 15px;
      line-height: 1.6;
      color: #e5e7eb;
      margin-bottom: 12px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .actions a {
      display: inline-block;
      background: #fff;
      color: #111827;
      text-decoration: none;
      padding: 10px 16px;
      border-radius: 999px;
      font-weight: 800;
    }

    a-scene {
      position: fixed !important;
      inset: 0 !important;
      width: 100vw !important;
      height: 100dvh !important;
      background: transparent !important;
      z-index: 1 !important;
      overflow: hidden !important;
    }

    video, #arjs-video {
      display: block !important;
      visibility: visible !important;
      opacity: 1 !important;
      position: fixed !important;
      inset: 0 !important;
      width: 100vw !important;
      height: 100dvh !important;
      object-fit: cover !important;
      z-index: 0 !important;
      transform: none !important;
    }

    canvas, .a-canvas {
      background: transparent !important;
      z-index: 2 !important;
      pointer-events: none !important;
    }
  </style>
</head>
<body>
  <div class="top-help">pattern-stanp1 をかざしてください。プロトケラトプスを表示します。</div>

  <div class="panel">
    <div class="title">
      <span>ARモデル調整</span>
      <span>プロトケラトプス</span>
    </div>
    <div id="status">マーカーを探しています。プロトケラトプスがマーカー上に出るか確認します。</div>
    <div class="actions">
      <a href="collection.html">コレクション</a>
      <a href="index.html">トップへ</a>
    </div>
  </div>

  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; antialias: true; alpha: true; colorManagement: true"
    gltf-model="dracoDecoderPath: https://www.gstatic.com/draco/versioned/decoders/1.5.6/;"
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono; trackingMethod: best;">

    <a-assets timeout="30000">
      <a-asset-item id="protoceratops-model" src="assets/models/protoceratops.glb"></a-asset-item>
    </a-assets>

    <a-marker id="test-marker" type="pattern" url="assets/markers/pattern-stanp1.patt" emitevents="true">
      <a-entity light="type: ambient; intensity: 1.8"></a-entity>
      <a-entity light="type: directional; intensity: 1.2" position="0 2 2"></a-entity>

      <!-- 見えた赤箱などを外し、プロトケラトプス単体にする -->
      <a-entity id="protoceratops-holder" position="0 0.02 0" rotation="0 180 0">
        <a-entity
          id="protoceratops-entity"
          gltf-model="#protoceratops-model"
          fit-gltf-on-marker="target: 1.45; yOffset: 0.05"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 12000">
        </a-entity>
      </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    const statusEl = document.getElementById('status');
    const sceneEl = document.querySelector('a-scene');
    if (sceneEl) {
      sceneEl.addEventListener('renderstart', () => {
        keepCameraBackgroundVisible();
        setTimeout(keepCameraBackgroundVisible, 500);
      });
    }
    const marker = document.getElementById('test-marker');

    marker.addEventListener('markerFound', () => {
      statusEl.textContent = 'pattern-stanp1 を認識しました。プロトケラトプスが見えるか確認してください。';
    });

    marker.addEventListener('markerLost', () => {
      statusEl.textContent = 'マーカーを見失いました。もう一度 pattern-stanp1 全体を画面に入れてください。';
    });

    window.addEventListener('error', (e) => {
      statusEl.textContent = 'エラー: ' + (e.message || '不明なエラー');
    });
  </script>
</body>
</html>
