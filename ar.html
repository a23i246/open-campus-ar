<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>ARカメラ - 恐竜ARスタンプラリー</title>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://unpkg.com/@ar-js-org/ar.js@3.4.5/aframe/build/aframe-ar.js"></script>
  <script src="js/dinosaurs.js"></script>
  <script src="js/collection.js"></script>
  <script src="js/ar-main.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0 !important;
      padding: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      min-width: 100vw !important;
      min-height: 100vh !important;
      overflow: hidden !important;
      overscroll-behavior: none;
      background: #000 !important;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: none;
      -webkit-text-size-adjust: 100%;
    }

    body {
      position: fixed !important;
      inset: 0 !important;
    }

    #ar-root {
      position: fixed !important;
      inset: 0 !important;
      width: 100vw !important;
      height: 100dvh !important;
      overflow: hidden !important;
      background: #000 !important;
    }

    a-scene,
    .a-canvas,
    canvas,
    video,
    #arjs-video {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      right: auto !important;
      bottom: auto !important;
      width: 100vw !important;
      height: 100dvh !important;
      max-width: none !important;
      max-height: none !important;
      min-width: 100vw !important;
      min-height: 100dvh !important;
      margin: 0 !important;
      padding: 0 !important;
      transform: none !important;
    }

    a-scene {
      z-index: 1 !important;
      background: transparent !important;
      overflow: hidden !important;
    }

    video,
    #arjs-video {
      display: block !important;
      visibility: visible !important;
      opacity: 1 !important;
      object-fit: cover !important;
      z-index: 0 !important;
      pointer-events: none !important;
      background: #000 !important;
    }

    canvas,
    .a-canvas {
      z-index: 2 !important;
      pointer-events: none !important;
      background: transparent !important;
    }

    .a-loader-title,
    .a-enter-vr,
    .a-enter-ar {
      display: none !important;
    }

    .top-help {
      position: fixed;
      top: calc(12px + env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      width: calc(100vw - 48px);
      max-width: 560px;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.94);
      color: #111827;
      font-size: 14px;
      font-weight: 800;
      line-height: 1.45;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
    }

    .panel {
      position: fixed;
      left: 16px;
      right: 16px;
      bottom: calc(16px + env(safe-area-inset-bottom));
      z-index: 9999;
      padding: 16px;
      border: 1px solid rgba(148, 163, 184, 0.4);
      border-radius: 20px;
      background: rgba(15, 23, 42, 0.92);
      color: #fff;
      backdrop-filter: blur(10px);
    }

    .title {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
      font-size: 18px;
      font-weight: 800;
    }

    #ar-status {
      margin-bottom: 12px;
      color: #e5e7eb;
      font-size: 15px;
      line-height: 1.6;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .actions a,
    .actions button {
      display: inline-block;
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      background: #fff;
      color: #111827;
      font-size: 14px;
      font-weight: 800;
      text-decoration: none;
    }

    .actions button:disabled {
      opacity: 0.55;
    }

    .count {
      opacity: 0.9;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div id="top-help" class="top-help">マーカーをかざしてください。対応する3Dモデルを表示します。</div>

  <div id="ar-root">
    <a-scene
      id="ar-scene"
      embedded
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      renderer="logarithmicDepthBuffer: true; antialias: true; alpha: true; colorManagement: true"
      gltf-model="dracoDecoderPath: https://www.gstatic.com/draco/versioned/decoders/1.5.6/;"
      arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono; trackingMethod: best;">

      <a-assets timeout="60000">
        <a-asset-item id="model-protoceratops" src="assets/models/protoceratops.glb"></a-asset-item>
        <a-asset-item id="model-ravjaa" src="assets/models/ravjaa.glb"></a-asset-item>
        <a-asset-item id="model-corythosaurus" src="assets/models/corythosaurus.glb"></a-asset-item>
        <a-asset-item id="model-zavacephale" src="assets/models/zavacephale.glb"></a-asset-item>
        <a-asset-item id="model-pinacosaurus" src="assets/models/raujaa.glb"></a-asset-item>
        <a-asset-item id="model-tarbosaurus" src="assets/models/torikosaurusu.glb"></a-asset-item>
      </a-assets>

      <a-marker id="marker-protoceratops" data-dino-id="protoceratops" type="pattern" url="assets/markers/pattern-stanp1.patt" emitevents="true">
        <a-entity light="type: ambient; intensity: 1.8"></a-entity>
        <a-entity light="type: directional; intensity: 1.2" position="0 2 2"></a-entity>
        <a-entity position="0 0.02 0" rotation="0 180 0">
          <a-entity class="dino-model" gltf-model="#model-protoceratops" fit-on-marker="target: 1.45; yOffset: 0.05" animation="property: rotation; to: 0 360 0; loop: true; dur: 12000"></a-entity>
        </a-entity>
      </a-marker>

      <a-marker id="marker-ravjaa" data-dino-id="ravjaa" type="pattern" url="assets/markers/pattern-stanp2.patt" emitevents="true">
        <a-entity light="type: ambient; intensity: 1.8"></a-entity>
        <a-entity light="type: directional; intensity: 1.2" position="0 2 2"></a-entity>
        <a-entity position="0 0.02 0" rotation="0 180 0">
          <a-entity class="dino-model" gltf-model="#model-ravjaa" fit-on-marker="target: 1.3; yOffset: 0.05" animation="property: rotation; to: 0 360 0; loop: true; dur: 12000"></a-entity>
        </a-entity>
      </a-marker>

      <a-marker id="marker-corythosaurus" data-dino-id="corythosaurus" type="pattern" url="assets/markers/pattern-stanp3.patt" emitevents="true">
        <a-entity light="type: ambient; intensity: 1.8"></a-entity>
        <a-entity light="type: directional; intensity: 1.2" position="0 2 2"></a-entity>
        <a-entity position="0 0.02 0" rotation="0 180 0">
          <a-entity class="dino-model" gltf-model="#model-corythosaurus" fit-on-marker="target: 1.35; yOffset: 0.05" animation="property: rotation; to: 0 360 0; loop: true; dur: 12000"></a-entity>
        </a-entity>
      </a-marker>

      <a-marker id="marker-zavacephale" data-dino-id="zavacephale" type="pattern" url="assets/markers/pattern-stanp4.patt" emitevents="true">
        <a-entity light="type: ambient; intensity: 1.8"></a-entity>
        <a-entity light="type: directional; intensity: 1.2" position="0 2 2"></a-entity>
        <a-entity position="0 0.02 0" rotation="0 180 0">
          <a-entity class="dino-model" gltf-model="#model-zavacephale" fit-on-marker="target: 1.3; yOffset: 0.05" animation="property: rotation; to: 0 360 0; loop: true; dur: 12000"></a-entity>
        </a-entity>
      </a-marker>

      <a-marker id="marker-pinacosaurus" data-dino-id="pinacosaurus" type="pattern" url="assets/markers/pattern-stanp5.patt" emitevents="true">
        <a-entity light="type: ambient; intensity: 1.8"></a-entity>
        <a-entity light="type: directional; intensity: 1.2" position="0 2 2"></a-entity>
        <a-entity position="0 0.02 0" rotation="0 180 0">
          <a-entity class="dino-model" gltf-model="#model-pinacosaurus" fit-on-marker="target: 1.25; yOffset: 0.05" animation="property: rotation; to: 0 360 0; loop: true; dur: 12000"></a-entity>
        </a-entity>
      </a-marker>

      <a-marker id="marker-tarbosaurus" data-dino-id="tarbosaurus" type="pattern" url="assets/markers/pattern-stanp6.patt" emitevents="true">
        <a-entity light="type: ambient; intensity: 1.8"></a-entity>
        <a-entity light="type: directional; intensity: 1.2" position="0 2 2"></a-entity>
        <a-entity position="0 0.02 0" rotation="0 180 0">
          <a-entity class="dino-model" gltf-model="#model-tarbosaurus" fit-on-marker="target: 1.35; yOffset: 0.05" animation="property: rotation; to: 0 360 0; loop: true; dur: 12000"></a-entity>
        </a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </div>

  <div id="ar-ui" class="panel">
    <div class="title">
      <span>ARカメラ</span>
      <span id="current-model-name">待機中</span>
    </div>
    <div id="ar-status">マーカーを探しています。マーカー全体が画面に入るようにしてください。</div>
    <div class="actions">
      <button id="add-collection" type="button" disabled>コレクションに追加</button>
      <a href="collection.html">コレクション</a>
      <a href="index.html">トップへ</a>
      <span class="count" id="collected-count">0 / 6</span>
    </div>
  </div>
</body>
</html>
