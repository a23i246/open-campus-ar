<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>ARカメラ - 恐竜ARスタンプラリー</title>
  <link rel="stylesheet" href="css/ar.css">
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <script src="js/dinosaurs.js"></script>
  <script src="js/collection.js"></script>
  <script src="js/ar-main.js" defer></script>
</head>
<body>
  <div id="start-screen" class="start-screen">
    <div class="start-card">
      <h1>ARカメラ</h1>
      <p>カメラを起動して、マーカー全体が画面に入るようにかざしてください。</p>
      <button id="start-ar-button" type="button">カメラを起動する</button>
      <div class="start-links">
        <a href="collection.html">コレクションを見る</a>
        <a href="index.html">トップへ戻る</a>
      </div>
      <p class="small-note">カメラ許可が表示されたら「許可」を押してください。</p>
    </div>
  </div>

  <div id="ar-root" class="ar-root" aria-hidden="true"></div>

  <div id="top-help" class="top-help" hidden><span>マーカー全体が画面に入るようにかざしてください</span></div>

  <div id="ar-ui" class="ar-ui" hidden>
    <div class="ar-panel">
      <div class="ar-title">
        <span>ARカメラ</span>
        <span id="collected-count">0 / 6</span>
      </div>
      <div class="ar-status" id="ar-status">マーカーを探しています。マーカー全体が画面に入るようにしてください。</div>
      <div class="ar-actions">
        <button id="add-collection" disabled>コレクションに追加</button>
        <a href="collection.html">コレクション</a>
        <a href="index.html">トップへ</a>
      </div>
    </div>
  </div>

  <template id="ar-scene-template">
    <a-scene
      id="ar-scene"
      embedded
      renderer="logarithmicDepthBuffer: true; antialias: true; alpha: true"
      gltf-model="dracoDecoderPath: https://www.gstatic.com/draco/versioned/decoders/1.5.6/;"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono; trackingMethod: best;">

      <a-assets id="model-assets" timeout="30000"></a-assets>

      <!--
        pattern-stanp.patt はお試し用ファイルとして assets/markers に残しています。
        ただし現在の pattern-stanp.patt と pattern-stanp1.patt が同一内容のため、
        同時に a-marker として読み込むと pattern-stanp1 が「お試しマーカー」として認識されます。
        そのため、AR画面ではお試しマーカーは読み込まず、pattern-stanp1 をプロトケラトプス専用にしています。
      -->

      <a-marker id="marker-protoceratops" type="pattern" url="assets/markers/pattern-stanp1.patt" emitevents="true" data-dino-id="protoceratops">
        <!-- 認識確認用。これが出れば「3D描画は成功」です。かなり大きめに表示しています。 -->
        <a-box position="0 0.5 0" depth="1.0" height="1.0" width="1.0" color="#ff0000" opacity="0.95" animation="property: rotation; to: 0 360 0; loop: true; dur: 4000"></a-box>
        <a-cylinder radius="0.95" height="0.08" position="0 0.04 0" color="#2563eb" opacity="0.95"></a-cylinder>
        <a-sphere radius="0.35" position="0 1.25 0" color="#22c55e"></a-sphere>
        <a-entity class="dino-model" gltf-model="url(assets/models/protoceratops.glb)" position="0 0 0" rotation="0 0 0" fit-on-marker="target: 1.0" animation="property: rotation; to: 0 360 0; loop: true; dur: 9000"></a-entity>
      </a-marker>
      <a-marker id="marker-ravjaa" type="pattern" url="assets/markers/pattern-stanp2.patt" emitevents="true" data-dino-id="ravjaa">
        <a-entity class="dino-model" gltf-model="url(assets/models/ravjaa.glb)" position="0 0 0" rotation="0 0 0" fit-on-marker="target: 1.0" animation="property: rotation; to: 0 360 0; loop: true; dur: 9000"></a-entity>
      </a-marker>
      <a-marker id="marker-corythosaurus" type="pattern" url="assets/markers/pattern-stanp3.patt" emitevents="true" data-dino-id="corythosaurus">
        <a-entity class="dino-model" gltf-model="url(assets/models/corythosaurus.glb)" position="0 0 0" rotation="0 0 0" fit-on-marker="target: 1.0" animation="property: rotation; to: 0 360 0; loop: true; dur: 9000"></a-entity>
      </a-marker>
      <a-marker id="marker-zavacephale" type="pattern" url="assets/markers/pattern-stanp4.patt" emitevents="true" data-dino-id="zavacephale">
        <a-entity class="dino-model" gltf-model="url(assets/models/zavacephale.glb)" position="0 0 0" rotation="0 0 0" fit-on-marker="target: 1.0" animation="property: rotation; to: 0 360 0; loop: true; dur: 9000"></a-entity>
      </a-marker>
      <a-marker id="marker-pinacosaurus" type="pattern" url="assets/markers/pattern-stanp5.patt" emitevents="true" data-dino-id="pinacosaurus">
        <a-entity class="dino-model" gltf-model="url(assets/models/raujaa.glb)" position="0 0 0" rotation="0 0 0" fit-on-marker="target: 1.0" animation="property: rotation; to: 0 360 0; loop: true; dur: 9000"></a-entity>
      </a-marker>
      <a-marker id="marker-tarbosaurus" type="pattern" url="assets/markers/pattern-stanp6.patt" emitevents="true" data-dino-id="tarbosaurus">
        <a-entity class="dino-model" gltf-model="url(assets/models/torikosaurusu.glb)" position="0 0 0" rotation="0 0 0" fit-on-marker="target: 1.0" animation="property: rotation; to: 0 360 0; loop: true; dur: 9000"></a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </template>
</body>
</html>
