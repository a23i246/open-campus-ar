<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>コレクション - 恐竜ARスタンプラリー</title>

  <link rel="stylesheet" href="css/common.css">

  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
  
  <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>

  <script src="js/dinosaurs.js"></script>
  <script src="js/collection.js"></script>
  <script defer src="js/collection-page.js"></script>
</head>
<body>
  <main class="page">
    <section class="hero collection-hero">
      <p class="eyebrow">AR COLLECTION</p>
      <h1>恐竜コレクション図鑑</h1>
      <p>集めた恐竜を確認できます。カードを押すと3Dモデルと説明が開きます。</p>
      <p class="collection-status">現在 <strong id="collection-total">0 / 6</strong> 体</p>

      <div class="nav">
        <a class="button" href="ar.html">ARカメラに戻る</a>
        <a class="button secondary" href="index.html">トップへ</a>
        <button class="button light" data-clear-collection>リセット</button>
      </div>
    </section>

    <section class="collection-grid" id="collection-root" aria-live="polite"></section>
  </main>

  <div class="modal" id="detail-modal" aria-hidden="true">
    <div class="modal-backdrop" data-close-modal></div>

    <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <button class="modal-close" type="button" data-close-modal aria-label="閉じる">×</button>

      <div class="modal-model" id="modal-model-wrap">
        <a-scene embedded renderer="antialias: true; alpha: true; colorManagement: true; exposure: 1.1" vr-mode-ui="enabled: false" loading-screen="enabled: false">
          <a-entity light="type: ambient; intensity: 1.7"></a-entity>
          <a-entity light="type: directional; intensity: 1.0" position="1 3 2"></a-entity>

          <a-entity id="modal-model" position="0 -0.35 -3" scale="2 2 2" rotation="0 0 0" animation-mixer></a-entity>

          <a-entity camera position="0 0 3.4"></a-entity>
        </a-scene>
      </div>

      <div class="model-zoom-controls" aria-label="3Dモデルの大きさ調整">
        <button class="button light" type="button" data-model-zoom="out">− 小さく</button>
        <button class="button light zoom-reset" type="button" data-model-zoom="reset"><span id="model-zoom-label">100%</span></button>
        <button class="button light" type="button" data-model-zoom="in">＋ 大きく</button>
      </div>

      <h2 id="modal-title">恐竜名</h2>
      <p id="modal-description">説明文</p>
      <div class="actions">
        <a class="button" id="modal-link" href="#" target="_blank" rel="noopener">詳細を見る</a>
        <button class="button light" type="button" data-close-modal>閉じる</button>
      </div>
      <p class="small">モデル部分を左右にフリックすると、横方向だけ回転できます。</p>
      <p class="small">3D表示が重い端末では、一覧カードだけで確認してください。</p>
    </section>
  </div>
</body>
</html>
